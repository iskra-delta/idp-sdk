name: Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release artifacts
        run: |
          make clean
          make

      - name: Package
        id: package
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ARCHIVE_NAME="idp-sdk-${VERSION}.tar.gz"
          STAGE_DIR="release/idp-sdk-${VERSION}"

          rm -rf release
          mkdir -p "${STAGE_DIR}/lib" "${STAGE_DIR}/include"

          cp "bin/libsdk.lib" "${STAGE_DIR}/lib/"
          cp "bin/libcpm3-z80.lib" "${STAGE_DIR}/lib/"
          cp "bin/libsdcc-z80.lib" "${STAGE_DIR}/lib/"
          cp "bin/crt0cpm3-z80.rel" "${STAGE_DIR}/lib/"
          cp -R "bin/include/." "${STAGE_DIR}/include/"
          cp LICENSE "${STAGE_DIR}/LICENSE"

          {
            echo "idp-sdk ${VERSION}"
            echo
            echo "Release package for idp-sdk."
            echo
            echo "Contents:"
            echo "- lib/libsdk.lib"
            echo "- lib/libcpm3-z80.lib"
            echo "- lib/libsdcc-z80.lib"
            echo "- lib/crt0cpm3-z80.rel"
            echo "- include/"
            echo "- LICENSE"
          } > "${STAGE_DIR}/README-release.txt"

          tar -C release -czf "release/${ARCHIVE_NAME}" "idp-sdk-${VERSION}"

          echo "archive_name=${ARCHIVE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "archive_path=release/${ARCHIVE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.package.outputs.version }}"
          RELEASE_DATE="$(date -u '+%b %-d, %Y')"
          BODY_FILE="release/release-notes.txt"
          CHANGES_FILE="release/changes.txt"

          PREV_TAG="$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)"
          if [ -n "${PREV_TAG}" ]; then
            git log --no-merges --pretty='- %s' "${PREV_TAG}..${TAG}" > "${CHANGES_FILE}" || true
          else
            git log --no-merges --pretty='- %s' "${TAG}" > "${CHANGES_FILE}" || true
          fi
          if [ ! -s "${CHANGES_FILE}" ]; then
            printf '%s\n' "- Maintenance release" > "${CHANGES_FILE}"
          fi

          {
            echo "v${VERSION}"
            echo "Released ${RELEASE_DATE}"
            echo
            echo "What's changed"
            cat "${CHANGES_FILE}"
            echo
            echo "Assets"
            echo "- ${{ steps.package.outputs.archive_name }}"
          } > "${BODY_FILE}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.package.outputs.version }}
          body_path: release/release-notes.txt
          files: |
            ${{ steps.package.outputs.archive_path }}
